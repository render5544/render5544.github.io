<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instacat — Живая лента | Аватарки эмодзи</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root {
            --bg: #f9f5ff;
            --surface: #ffffff;
            --text: #1e1a2f;
            --text-secondary: #7d66ae;
            --primary: #9b4dff;
            --primary-dark: #7c3aed;
            --border: #e9d9ff;
            --danger: #e74c3c;
            --success: #27ae60;
            --shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        body { background: var(--bg); color: var(--text); padding-bottom: 70px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(145deg, #e9defa 0%, #d6c5f0 100%); padding: 20px; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1000; overflow-y: auto; }
        .auth-card { background: var(--surface); border-radius: 48px; padding: 40px 32px; width: 100%; max-width: 480px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); animation: fadeIn 0.4s ease; }
        .logo-big { font-size: 52px; font-weight: 800; background: linear-gradient(135deg, #9b4dff, #c462ff, #ff85c0); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; margin-bottom: 24px; }
        .input-field { width: 100%; padding: 14px 18px; border: 2px solid var(--border); border-radius: 44px; background: var(--surface); color: var(--text); font-size: 16px; margin-top: 12px; outline: none; }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(155,77,255,0.2); }
        .btn { width: 100%; padding: 14px 24px; border-radius: 44px; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.2s; border: none; margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: scale(1.02); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .hidden { display: none !important; }
        
        .app-container { max-width: 600px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .navbar { background: var(--surface); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); background: rgba(255,255,255,0.95); }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #9b4dff, #c462ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .avatar-emoji { font-size: 38px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--bg); border-radius: 50%; cursor: pointer; border: 2px solid var(--primary); }
        .badge { background: linear-gradient(135deg, gold, #ffaa00); padding: 4px 12px; border-radius: 40px; font-weight: bold; color: #333; font-size: 13px; cursor: pointer; }
        .plus-badge { background: linear-gradient(135deg, #9b4dff, #c462ff); color: white; padding: 2px 10px; border-radius: 40px; font-size: 11px; font-weight: 700; margin-left: 6px; display: inline-block; }
        
        .create-card { background: var(--surface); margin: 16px; border-radius: 28px; padding: 16px; display: flex; gap: 12px; flex-wrap: wrap; box-shadow: var(--shadow); }
        .caption-input { flex: 1; padding: 12px 18px; border-radius: 40px; border: 1px solid var(--border); background: var(--bg); outline: none; }
        
        .post-card { background: var(--surface); margin: 16px; border-radius: 28px; overflow: hidden; box-shadow: var(--shadow); animation: fadeIn 0.3s ease; }
        .post-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
        .post-user { display: flex; gap: 12px; align-items: center; }
        .post-avatar-emoji { font-size: 44px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--bg); border-radius: 50%; }
        .post-actions { padding: 12px 16px; }
        .action-icons { display: flex; gap: 24px; font-size: 26px; margin-bottom: 10px; }
        .action-icon { cursor: pointer; transition: 0.1s; }
        .action-icon:active { transform: scale(0.95); }
        .comment-section { border-top: 1px solid var(--border); padding: 12px; margin-top: 8px; }
        .comment-input { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input input { flex: 1; padding: 10px 14px; border-radius: 40px; border: 1px solid var(--border); background: var(--bg); }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); display: flex; justify-content: space-around; padding: 12px 20px 22px; border-top: 1px solid var(--border); z-index: 100; backdrop-filter: blur(10px); background: rgba(255,255,255,0.96); }
        .nav-item { font-size: 26px; color: var(--text-secondary); cursor: pointer; transition: 0.2s; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1500; animation: fadeIn 0.2s; }
        .modal-content { background: var(--surface); border-radius: 32px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 24px; border-radius: 40px; z-index: 2000; font-size: 14px; animation: fadeIn 0.2s; }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        .emoji-list { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 16px 0; }
        .emoji-option { font-size: 40px; cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.1s; }
        .emoji-option:hover { background: var(--bg); transform: scale(1.1); }
    </style>
</head>
<body>

<div id="authContainer" class="auth-container">
    <div class="auth-card">
        <div class="logo-big">🐱 Instacat 💜</div>
        <p style="text-align:center; margin-bottom:16px;">Аватарки — только эмодзи! 🎭</p>
        <div id="loginForm">
            <input type="text" id="loginUsername" class="input-field" placeholder="Логин или Email">
            <input type="password" id="loginPassword" class="input-field" placeholder="Пароль">
            <button id="doLogin" class="btn btn-primary">🔓 Войти</button>
            <button id="showRegisterBtn" class="btn btn-outline">📝 Создать аккаунт</button>
            <button id="anonymousLoginBtn" class="btn btn-outline">👤 Анонимный вход</button>
        </div>
        <div id="registerForm" class="hidden">
            <input type="text" id="regUsername" class="input-field" placeholder="Логин (буквы, цифры, _)">
            <input type="email" id="regEmail" class="input-field" placeholder="Email">
            <input type="text" id="regName" class="input-field" placeholder="Отображаемое имя">
            <input type="password" id="regPassword" class="input-field" placeholder="Пароль (≥6)">
            <input type="password" id="regPasswordConfirm" class="input-field" placeholder="Повторите пароль">
            <textarea id="regBio" class="input-field" placeholder="О себе" rows="2"></textarea>
            <div style="text-align:center; margin:16px 0;">
                <p style="margin-bottom:8px;">Выберите аватар-эмодзи:</p>
                <div class="emoji-list" id="emojiSelector">
                    <span class="emoji-option" data-emoji="🐱">🐱</span>
                    <span class="emoji-option" data-emoji="😺">😺</span>
                    <span class="emoji-option" data-emoji="🐈">🐈</span>
                    <span class="emoji-option" data-emoji="😸">😸</span>
                    <span class="emoji-option" data-emoji="🐾">🐾</span>
                    <span class="emoji-option" data-emoji="🌟">🌟</span>
                    <span class="emoji-option" data-emoji="💜">💜</span>
                    <span class="emoji-option" data-emoji="🎭">🎭</span>
                </div>
                <div id="selectedEmojiDisplay" style="font-size:48px; margin-top:8px;">🐱</div>
                <input type="hidden" id="selectedEmoji" value="🐱">
            </div>
            <button id="doRegister" class="btn btn-primary">✅ Зарегистрироваться</button>
            <button id="showLoginBtn" class="btn btn-outline">← Назад</button>
        </div>
    </div>
</div>

<div id="appContainer" class="app-container hidden">
    <div class="navbar">
        <div class="logo">Instacat 🐾</div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div id="coinDisplay" class="badge">⭐ 0</div>
            <div id="navAvatar" class="avatar-emoji">🐱</div>
            <i id="logoutIcon" class="fas fa-sign-out-alt" style="font-size:20px; cursor:pointer;"></i>
        </div>
    </div>
    
    <div id="createPostCard" class="create-card">
        <input type="text" id="postCaption" class="caption-input" placeholder="Что нового? #instacat">
        <button id="publishPostBtn" class="btn btn-primary" style="width:auto; padding:10px 20px;">Опубликовать</button>
    </div>
    
    <div id="feedContainer"><div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка ленты...</div></div>
    
    <div class="bottom-nav">
        <div class="nav-item" id="homeNav"><i class="fas fa-home"></i></div>
        <div class="nav-item" id="profileNav"><i class="fas fa-user"></i></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, updateDoc, doc, arrayUnion, arrayRemove, onSnapshot, Timestamp, setDoc, getDoc, deleteDoc, where } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    // ВАШ РАБОЧИЙ КОНФИГ
    const firebaseConfig = {
        apiKey: "AIzaSyAi7MgQbIgqraKp1HnuPDwOAcm3B5y50oo",
        authDomain: "instacat-8ac19.firebaseapp.com",
        projectId: "instacat-8ac19",
        storageBucket: "instacat-8ac19.firebasestorage.app",
        messagingSenderId: "1055379017127",
        appId: "1:1055379017127:web:3e4ce3fc4dd2875113fa82"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    let currentUser = null;
    let isAnonymous = false;
    let unsubscribeFeed = null;
    
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        toast.style.backgroundColor = isError ? '#e74c3c' : 'var(--primary)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function formatTimeAgo(date) {
        if (!date) return "только что";
        const seconds = Math.floor((Date.now() - date.toDate()) / 1000);
        if (seconds < 60) return `${seconds} сек назад`;
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes} мин назад`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours} ч назад`;
        return `${Math.floor(hours / 24)} дн назад`;
    }
    
    async function getUserData(uid) {
        const snap = await getDoc(doc(db, "users", uid));
        return snap.exists() ? snap.data() : null;
    }
    
    async function updateStars(uid, amount) {
        if (isAnonymous) return;
        const userRef = doc(db, "users", uid);
        const userData = await getUserData(uid);
        const currentStars = userData?.stars || 0;
        await setDoc(userRef, { stars: currentStars + amount }, { merge: true });
        if (currentUser && currentUser.uid === uid) {
            document.getElementById('coinDisplay').innerHTML = `⭐ ${currentStars + amount}`;
        }
    }
    
    async function toggleLike(postId, postOwnerId, currentLikes) {
        if (isAnonymous) { showToast("Анонимный режим: нельзя ставить лайки", true); return; }
        if (postOwnerId === currentUser.uid) { showToast("Нельзя лайкать свои посты", true); return; }
        const postRef = doc(db, "posts", postId);
        const isLiked = currentLikes.includes(currentUser.uid);
        if (isLiked) {
            await updateDoc(postRef, { likes: arrayRemove(currentUser.uid), likeCount: currentLikes.length - 1 });
        } else {
            await updateDoc(postRef, { likes: arrayUnion(currentUser.uid), likeCount: currentLikes.length + 1 });
            await updateStars(currentUser.uid, 1);
        }
    }
    
    async function addComment(postId, text) {
        if (isAnonymous) { showToast("Анонимный режим: нельзя комментировать", true); return; }
        if (!text.trim()) return;
        await addDoc(collection(db, `posts/${postId}/comments`), {
            userId: currentUser.uid,
            userName: currentUser.displayName,
            userAvatar: currentUser.photoURL || "🐱",
            text: text.trim(),
            createdAt: Timestamp.now()
        });
    }
    
    async function deletePost(postId, ownerId) {
        if (currentUser.uid !== ownerId) { showToast("Нет прав", true); return; }
        await deleteDoc(doc(db, "posts", postId));
        showToast("Пост удалён");
    }
    
    function renderPost(post, postId) {
        const div = document.createElement('div');
        div.className = 'post-card';
        const isLiked = post.likes?.includes(currentUser?.uid) || false;
        const isOwner = currentUser?.uid === post.userId;
        
        div.innerHTML = `
            <div class="post-header">
                <div class="post-user">
                    <div class="post-avatar-emoji">${post.userAvatar || "🐱"}</div>
                    <div><strong>${escapeHtml(post.userName)}</strong><div style="font-size:11px;">${formatTimeAgo(post.createdAt)}</div></div>
                </div>
                <div>${isOwner ? `<i class="fas fa-trash delete-post" data-id="${postId}" style="color:var(--danger); cursor:pointer;"></i>` : ''}</div>
            </div>
            <div style="padding:0 16px 8px 16px;"><strong>${escapeHtml(post.userName)}</strong> ${escapeHtml(post.caption || '')}</div>
            <div class="post-actions">
                <div class="action-icons">
                    <div class="action-icon like-icon" data-id="${postId}"><i class="${isLiked ? 'fas fa-heart' : 'far fa-heart'}" style="color:${isLiked ? '#e84393' : ''}"></i></div>
                    <div class="action-icon comment-toggle" data-id="${postId}"><i class="far fa-comment"></i></div>
                </div>
                <div><strong>${post.likeCount || 0} отметок "Нравится"</strong></div>
                <div id="comments-${postId}" class="comment-section hidden">
                    <div id="commentsList-${postId}"></div>
                    <div class="comment-input"><input id="commentInput-${postId}" placeholder="Написать комментарий..."><button class="send-comment" data-id="${postId}">→</button></div>
                </div>
            </div>
        `;
        
        div.querySelector('.like-icon')?.addEventListener('click', () => toggleLike(postId, post.userId, post.likes || []));
        div.querySelector('.delete-post')?.addEventListener('click', () => { if(confirm("Удалить пост?")) deletePost(postId, post.userId); });
        
        div.querySelector('.comment-toggle')?.addEventListener('click', async () => {
            const commentsDiv = div.querySelector(`#comments-${postId}`);
            commentsDiv.classList.toggle('hidden');
            if (!commentsDiv.classList.contains('hidden')) {
                const commentsSnap = await getDocs(query(collection(db, `posts/${postId}/comments`), orderBy("createdAt", "desc")));
                const commentsList = div.querySelector(`#commentsList-${postId}`);
                commentsList.innerHTML = '';
                commentsSnap.forEach(c => {
                    const data = c.data();
                    commentsList.innerHTML += `<div style="margin:8px 0; font-size:13px;"><strong>${escapeHtml(data.userName)}</strong> ${escapeHtml(data.text)}<br><small style="font-size:10px;">${formatTimeAgo(data.createdAt)}</small></div>`;
                });
            }
        });
        
        div.querySelector('.send-comment')?.addEventListener('click', async () => {
            const input = div.querySelector(`#commentInput-${postId}`);
            await addComment(postId, input.value);
            input.value = '';
            div.querySelector('.comment-toggle').click();
            div.querySelector('.comment-toggle').click();
        });
        
        return div;
    }
    
    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) || ''; }
    
    function subscribeToFeed() {
        if (unsubscribeFeed) unsubscribeFeed();
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        unsubscribeFeed = onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                feedContainer.innerHTML = '<div class="loading">🐱 Нет постов, будьте первым!</div>';
                return;
            }
            feedContainer.innerHTML = '';
            snapshot.forEach(docSnap => {
                feedContainer.appendChild(renderPost({ id: docSnap.id, ...docSnap.data() }, docSnap.id));
            });
        });
    }
    
    async function publishPost() {
        if (isAnonymous) { showToast("Анонимный режим: нельзя публиковать", true); return; }
        const caption = document.getElementById('postCaption').value;
        if (!caption) { showToast("Напишите текст", true); return; }
        
        await addDoc(collection(db, "posts"), {
            userId: currentUser.uid,
            userName: currentUser.displayName,
            userAvatar: currentUser.photoURL || "🐱",
            caption: caption,
            likes: [],
            likeCount: 0,
            createdAt: Timestamp.now()
        });
        await updateStars(currentUser.uid, 10);
        document.getElementById('postCaption').value = '';
        showToast("Пост опубликован! +10 ⭐");
    }
    
    // Регистрация с эмодзи
    let selectedEmoji = "🐱";
    document.querySelectorAll('.emoji-option').forEach(el => {
        el.addEventListener('click', () => {
            selectedEmoji = el.dataset.emoji;
            document.getElementById('selectedEmojiDisplay').innerHTML = selectedEmoji;
            document.getElementById('selectedEmoji').value = selectedEmoji;
        });
    });
    
    document.getElementById('doRegister')?.addEventListener('click', async () => {
        const username = document.getElementById('regUsername').value.trim().toLowerCase();
        const email = document.getElementById('regEmail').value.trim();
        const name = document.getElementById('regName').value.trim();
        const pass = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regPasswordConfirm').value;
        const avatarEmoji = document.getElementById('selectedEmoji').value;
        
        if (!username || !email || !name || pass.length < 6) { showToast("Заполните все поля", true); return; }
        if (pass !== confirm) { showToast("Пароли не совпадают", true); return; }
        if (!/^[a-zA-Z0-9_]+$/.test(username)) { showToast("Логин может содержать только буквы, цифры и _", true); return; }
        if (name.includes('++')) { showToast("Имя не может содержать ++", true); return; }
        
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, pass);
            await updateProfile(cred.user, { displayName: name, photoURL: avatarEmoji });
            await setDoc(doc(db, "users", cred.user.uid), {
                username: username, name: name, email: email, bio: document.getElementById('regBio').value,
                stars: 100, hasPlus: false, avatar: avatarEmoji, createdAt: Timestamp.now()
            });
            showToast("Регистрация успешна! +100 ⭐");
        } catch(e) { showToast(e.message, true); }
    });
    
    document.getElementById('doLogin')?.addEventListener('click', async () => {
        const loginInput = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        let email = loginInput;
        if (!loginInput.includes('@')) {
            const usersSnapshot = await getDocs(collection(db, "users"));
            let foundEmail = null;
            usersSnapshot.forEach(doc => {
                if (doc.data().username === loginInput.toLowerCase()) foundEmail = doc.data().email;
            });
            if (foundEmail) email = foundEmail;
            else { showToast("Пользователь не найден", true); return; }
        }
        try { await signInWithEmailAndPassword(auth, email, password); }
        catch(e) { showToast(e.message, true); }
    });
    
    document.getElementById('anonymousLoginBtn')?.addEventListener('click', async () => {
        try { await signInAnonymously(auth); showToast("Анонимный вход (только чтение)"); }
        catch(e) { showToast(e.message, true); }
    });
    
    document.getElementById('showRegisterBtn')?.addEventListener('click', () => {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
    });
    
    document.getElementById('showLoginBtn')?.addEventListener('click', () => {
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
    });
    
    document.getElementById('logoutIcon')?.addEventListener('click', () => signOut(auth));
    document.getElementById('publishPostBtn')?.addEventListener('click', publishPost);
    document.getElementById('homeNav')?.addEventListener('click', () => window.scrollTo({top:0}));
    document.getElementById('profileNav')?.addEventListener('click', async () => {
        if (currentUser) {
            const data = await getUserData(currentUser.uid);
            showToast(`👤 ${currentUser.displayName || 'Пользователь'} | ⭐ ${data?.stars || 0}`);
        }
    });
    
    const feedContainer = document.getElementById('feedContainer');
    
    onAuthStateChanged(auth, async (user) => {
        if (user && !user.isAnonymous) {
            currentUser = user;
            isAnonymous = false;
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('appContainer').classList.remove('hidden');
            document.getElementById('navAvatar').innerHTML = user.photoURL || "🐱";
            const userData = await getUserData(user.uid);
            document.getElementById('coinDisplay').innerHTML = `⭐ ${userData?.stars || 0}`;
            subscribeToFeed();
            document.getElementById('createPostCard').style.display = 'flex';
        } else if (user && user.isAnonymous) {
            currentUser = user;
            isAnonymous = true;
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('appContainer').classList.remove('hidden');
            document.getElementById('navAvatar').innerHTML = "👤";
            document.getElementById('coinDisplay').innerHTML = `👤 Аноним`;
            subscribeToFeed();
            document.getElementById('createPostCard').style.display = 'none';
        } else {
            if (unsubscribeFeed) unsubscribeFeed();
            document.getElementById('authContainer').classList.remove('hidden');
            document.getElementById('appContainer').classList.add('hidden');
        }
    });
</script>
</body>
</html>
